name: "Quality Control CI"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-markdown:
    name: "Linting Markdown Files"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Markdown Lint (Auto-fix Check)"
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**

  python-analysis:
    name: "Python Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy matplotlib

      - name: "Black Formatting Check"
        run: black --check .

      - name: "Flake8 Linting"
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: "Verify Manuscript Scripts"
        run: |
          # Basic syntax check for core scripts
          python -m py_compile build_review_package.py manuscript_profiles.py
