name: "Release Artifacts & Deployment"

on:
  push:
    tags:
      - 'v*'

jobs:
  build-packages:
    name: "Generate Manuscript Packages"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Set up Python & Pandoc"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: "Install Pandoc"
        run: |
          sudo apt-get install -y pandoc

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib

      - name: "Generate All Packages"
        run: |
          # Loop through typical package JSON files
          for pkg in pkg_*.json; do
            if [ -f "$pkg" ]; then
              echo "Building package for $pkg"
              python build_review_package.py "$pkg"
            fi
          done

      - name: "Upload Build Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: workshop-manuscripts-all
          path: Manuscript_Package*
          if-no-files-found: warn

  github-pages:
    name: "Deploy Book to Pages"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      
      - name: "Set up Python & Pandoc"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: "Install Pandoc"
        run: sudo apt-get install -y pandoc

      - name: "Build Book HTML"
        run: python build_book.py

      - name: "Upload Pages artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
